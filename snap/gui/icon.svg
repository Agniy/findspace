<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="128" fill="#1a1a2e"/>

  <!-- Folder body -->
  <rect x="44" y="90" width="148" height="100" rx="10" ry="10" fill="#16213e"/>
  <rect x="44" y="78" width="68" height="22" rx="8" ry="8" fill="#16213e"/>

  <!-- Folder outline -->
  <rect x="44" y="90" width="148" height="100" rx="10" ry="10" fill="none" stroke="#0f3460" stroke-width="4"/>
  <rect x="44" y="78" width="68" height="22" rx="8" ry="8" fill="none" stroke="#0f3460" stroke-width="4"/>

  <!-- Bar chart inside folder (representing sizes) -->
  <rect x="64" y="148" width="18" height="28" rx="3" fill="#e94560" opacity="0.9"/>
  <rect x="90" y="132" width="18" height="44" rx="3" fill="#e94560" opacity="0.75"/>
  <rect x="116" y="118" width="18" height="58" rx="3" fill="#e94560" opacity="0.6"/>
  <rect x="142" y="138" width="18" height="38" rx="3" fill="#e94560" opacity="0.45"/>

  <!-- Magnifying glass -->
  <circle cx="172" cy="96" r="34" fill="none" stroke="#00d4aa" stroke-width="10"/>
  <circle cx="172" cy="96" r="22" fill="#1a1a2e" opacity="0.6"/>
  <line x1="197" y1="121" x2="220" y2="144" stroke="#00d4aa" stroke-width="10" stroke-linecap="round"/>
</svg>
